# CONDUIT — Alembic Configuration
# ============================================================
# This file is used by Alembic for database migrations
# Place this file in your project ROOT directory
# i.e. D:\Portfolio\Conduit\alembic.ini
# ============================================================

[alembic]
# Path to migration scripts folder
# Relative to the location of this alembic.ini file
script_location = database/migrations

# Add project root to sys.path so imports work
prepend_sys_path = .

# Default database URL
# This gets overridden by DATABASE_URL in your .env file
# via database/migrations/env.py
sqlalchemy.url = postgresql://conduit_user:conduit_pass@localhost:5432/conduit

# Timezone for migration timestamps
# UTC is recommended for consistency
timezone = UTC

# Max length of characters to display in truncated output
truncate_slug_length = 40

# Version path separator — use os (default)
version_path_separator = os


# ── LOGGING CONFIGURATION ────────────────────────────────────────────────────

[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
