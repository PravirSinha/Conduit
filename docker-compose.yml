# docker-compose.yml
version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: conduit_postgres
    environment:
      POSTGRES_DB: conduit
      POSTGRES_USER: conduit_user
      POSTGRES_PASSWORD: conduit_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conduit_user -d conduit"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: conduit_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://conduit_user:conduit_pass@postgres:5432/conduit
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_INDEX_NAME=${PINECONE_INDEX_NAME}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    build: .
    container_name: conduit_dashboard
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - api
    volumes:
      - .:/app
    command: streamlit run dashboard/app.py --server.port 8501

volumes:
  postgres_data: