services:
  db:
    image: postgres:15
    container_name: conduit-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-conduit_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-conduit_pass}
      POSTGRES_DB: ${POSTGRES_DB:-conduit}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-conduit_user} -d ${POSTGRES_DB:-conduit}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: conduit:latest
    container_name: conduit-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://conduit_user:conduit_pass@db:5432/conduit}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_state:/var/lib/conduit
    ports:
      - "8000:8000"
      - "8501:8501"
    command: ["/bin/sh", "/app/scripts/startup.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

volumes:
  postgres_data:
  app_state:
