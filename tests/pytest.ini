[pytest]
testpaths       = tests
python_files    = test_*.py
python_classes  = Test*
python_functions = test_*

# Output
addopts =
    --verbose
    --tb=short
    --strict-markers
    -p no:warnings

# Custom markers
markers =
    unit:        Pure unit tests — no DB, no LLM
    integration: Integration tests — requires running DB
    slow:        Tests that call LLM or Pinecone (skip in CI)