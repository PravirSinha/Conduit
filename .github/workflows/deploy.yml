name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

env:
  GCP_REGION: asia-south1
  GCP_PROJECT: conduit-492602
  IMAGE_BACKEND: asia-south1-docker.pkg.dev/conduit-492602/conduit-repo/conduit
  IMAGE_DASHBOARD: asia-south1-docker.pkg.dev/conduit-492602/conduit-repo/conduit-dashboard
  BACKEND_URL: https://conduit-577817366021.asia-south1.run.app

jobs:
  deploy:
    name: Build, Push, and Deploy
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      # ── BUILD & PUSH BACKEND ─────────────────────────────────────────────
      - name: Build and push backend image
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          docker build -t ${{ env.IMAGE_BACKEND }}:$IMAGE_TAG -t ${{ env.IMAGE_BACKEND }}:latest .
          docker push ${{ env.IMAGE_BACKEND }}:$IMAGE_TAG
          docker push ${{ env.IMAGE_BACKEND }}:latest

      # ── BUILD & PUSH DASHBOARD ───────────────────────────────────────────
      - name: Build and push dashboard image
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          docker build \
            -f Dockerfile.dashboard \
            -t ${{ env.IMAGE_DASHBOARD }}:$IMAGE_TAG \
            -t ${{ env.IMAGE_DASHBOARD }}:latest \
            .
          docker push ${{ env.IMAGE_DASHBOARD }}:$IMAGE_TAG
          docker push ${{ env.IMAGE_DASHBOARD }}:latest

      # ── DEPLOY BACKEND TO CLOUD RUN ──────────────────────────────────────
      - name: Deploy backend to Cloud Run
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          gcloud run deploy conduit \
            --image=${{ env.IMAGE_BACKEND }}:$IMAGE_TAG \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --add-cloudsql-instances=${{ env.GCP_PROJECT }}:${{ env.GCP_REGION }}:conduit-db \
            --port=8000 \
            --set-env-vars="ENVIRONMENT=production,LOG_LEVEL=INFO,OPENAI_MODEL_NAME=gpt-4o,AUTO_APPROVE_THRESHOLD=50000,OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }},PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }},PINECONE_INDEX_NAME=${{ secrets.PINECONE_INDEX_NAME }},DATABASE_URL=postgresql://conduit_user:conduit_pass@/conduit?host=/cloudsql/conduit-492602:asia-south1:conduit-db,LANGCHAIN_TRACING_V2=${{ secrets.LANGCHAIN_TRACING_V2 }},LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }},LANGCHAIN_PROJECT=${{ secrets.LANGCHAIN_PROJECT }},LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }},LANGSMITH_ENDPOINT=${{ secrets.LANGSMITH_ENDPOINT }},LANGSMITH_PROJECT=${{ secrets.LANGSMITH_PROJECT }},INTAKE_HITL_ENABLED=${{ secrets.INTAKE_HITL_ENABLED }},TRANSACTION_HITL_ENABLED=${{ secrets.TRANSACTION_HITL_ENABLED }},ADVISOR_PIN=${{ secrets.ADVISOR_PIN }}"

      # ── DEPLOY DASHBOARD TO CLOUD RUN ────────────────────────────────────
      - name: Deploy dashboard to Cloud Run
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          gcloud run deploy conduit-dashboard \
            --image=${{ env.IMAGE_DASHBOARD }}:$IMAGE_TAG \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8501 \
            --min-instances=1 \
            --set-env-vars="API_URL=${{ env.BACKEND_URL }},ADVISOR_PIN=${{ secrets.ADVISOR_PIN }},OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }},PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }},PINECONE_INDEX_NAME=${{ secrets.PINECONE_INDEX_NAME }},DATABASE_URL=postgresql://conduit_user:conduit_pass@/conduit?host=/cloudsql/conduit-492602:asia-south1:conduit-db,INTAKE_HITL_ENABLED=${{ secrets.INTAKE_HITL_ENABLED }},TRANSACTION_HITL_ENABLED=${{ secrets.TRANSACTION_HITL_ENABLED }}"